{% extends "general/header_footer_dashboard.html" %}
{% load static %}
{% block content %}
    <link rel="stylesheet" href="{% static 'css/specific/style_cls_creation.css'%}">
    <form method="POST" action="{% url 'matscholar_app:cls_creation_forms'%}">
        {% csrf_token%}
        <div class="courses_select_div">
            <p class="courses_p">Salas disponíveis</p>
            <select class="courses_select"name="class" id="class">
                {% for class in classes_query %}
                    <option value="{{class.0}}">{{class.1}}</option>
                {% endfor %}
            </select>
            <input class="forms_submit_input"type="submit" value="Avançar">
        </div>
    </form>

{% endblock content %}
